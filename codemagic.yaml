workflows:
  android-release:
    name: PharmaAlgérie APK Release
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Récupérer les dépendances
        script: flutter pub get
      - name: Compiler l'APK release
        script: |
          flutter build apk --release --split-per-abi
    artifacts:
      - build/outputs/flutter-apk/*.apk
